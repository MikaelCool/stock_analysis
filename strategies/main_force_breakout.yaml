name: main_force_breakout
display_name: 主力突破
description: 沪深主板非 ST 股票池内，寻找曾有连板记忆、回调后 5 日线放量上穿 20 日线并缩量回踩的主力二波候选。
category: breakout
core_rules:
  - 近阶段出现过连续涨停或接近涨停的强势记忆
  - 回调后 5 日线放量上穿 20 日线
  - 上穿后股价回踩 20 日线附近且量能收缩
  - 20 日线与 60 日线向上，MACD 保持多头
  - 结合板块强度、资金流入、市场情绪和消息面确认参与价值
default_active: false
default_priority: 4
instructions: |
  只在沪深主板非 ST 股票池内运行。策略目标是寻找前期有连板或接近连板强势记忆、回调后可能走二波的主力标的。
  核心形态是：前期连板后回调，5 日线放量上穿 20 日线，随后股价回踩 20 日线附近且成交量缩量，20 日线和 60 日线保持向上。
  输出时说明连板记忆、回踩质量、缩量程度、主力资金/板块配合、风险位和次日买卖计划。

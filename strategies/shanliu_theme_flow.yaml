name: shanliu_theme_flow
display_name: 山流
description: 沪深主板非 ST 股票池内，识别题材合力、机构主导和游资接力共振的短线情绪周期启动点。
category: theme
core_rules:
  - 优先选择真实市场强题材、强资金流入、同题材候选共振的方向
  - 锂电、算力等概念题材优先按题材主线识别，而不是只按申万/东财行业名识别
  - 识别高度龙头、中军、接力和弱情绪低吸四类角色
  - 市场情绪强时偏高抛套利和顺势接力，市场情绪弱时只做核心低吸
  - 不固定过滤行业，但不能把单只候选股涨幅误当作真实强板块
  - 结合消息面利好利空、盘口量价和回测优化参数进行最终排序
default_active: false
default_priority: 6
instructions: |
  只在沪深主板非 ST 股票池内运行。策略目标是第一时间识别题材合力启动，寻找机构主导、游资接力、高度龙头和中军共振的方向。
  不固定过滤任何行业，而是根据真实板块涨幅、资金流入、同题材候选数量、机构/短线资金特征动态打分。
  题材识别要优先保留锂电、电池、能源金属、算力、数据中心、服务器、云计算、光模块等概念主线，避免只显示传统行业标签。
  市场情绪好时做顺势跟随和高抛套利，市场情绪弱时只考虑核心票低吸拿筹码。
  输出时必须标明所属板块、题材角色、资金强度、情绪模式、风险位和次日买卖计划。

name: swing_trend_follow
display_name: 波段趋势
description: 沪深主板非 ST 股票池内，筛选均线多头、间隔有序、趋势稳定的 5-10 日波段跟随标的。
category: swing
core_rules:
  - 5/10/20/30 日线多头排列且同步向上，股价必须站在向上的 60 日线之上
  - 只做整体上升趋势中的小级别回调，排除 MA20/MA60 压制下的下降趋势反抽
  - 回踩 20 日线时 K 线实体要守在 MA20 上方或极近位置，不能明显跌破 MA20
  - 股价贴近 20 日线或踩着 5/10 日线继续上行，避免距离 MA20 过远的追高
  - 近 8 日存在温和放量，MACD 保持多头
  - 结合板块强度、资金流入、市场情绪和消息面进行二次排序
default_active: false
default_priority: 3
instructions: |
  只在沪深主板非 ST 股票池内运行。策略目标是寻找已经形成 MA5 > MA10 > MA20 > MA30 且各均线同步向上的趋势票。
  优先选择均线间隔均匀、股价沿 5 日线或 10 日线上行、60 日线向上的标的；如果是回踩 MA20，K 线实体不能明显低于 MA20。
  排除整体仍处于下降趋势、只是短线反抽或距离 MA20 过远的标的，避免把追高当成波段回踩。
  输出时说明均线强度、量价承接、板块强度、风险位和次日买卖计划。

name: swing_trend_follow
display_name: 波段趋势
description: 沪深主板非 ST 股票池内，筛选均线多头、间隔有序、趋势稳定的 5-10 日波段跟随标的。
category: swing
core_rules:
  - 5/10/20/30 日线多头排列且同步向上
  - 均线间隔为正且尽量均匀，避免刚金叉但趋势未展开
  - 60 日线向上，股价贴近 5 日线或沿 5 日线上行
  - 近 8 日存在温和放量，MACD 保持多头
  - 结合板块强度、资金流入、市场情绪和消息面进行二次排序
default_active: false
default_priority: 3
instructions: |
  只在沪深主板非 ST 股票池内运行。策略目标是寻找已经形成 MA5 > MA10 > MA20 > MA30 且各均线同步向上的趋势票。
  优先选择均线间隔均匀、股价沿 5 日线或 10 日线上行、60 日线向上的标的，避免只因 20 日线上穿 30 日线但趋势尚未展开的弱启动。
  输出时说明均线强度、量价承接、板块强度、风险位和次日买卖计划。
